<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AGREX 2026 | Africa Gulf Real Estate Expo</title>
    <meta
      name="description"
      content="AGREX 2026 est la plateforme internationale reliant l'Afrique et le Golfe autour de l'investissement immobilier, des smart cities, des infrastructures urbaines et des accords strategiques depuis Dubai."
    />
    <meta
      name="keywords"
      content="AGREX, Africa Gulf Real Estate Expo, Dubai real estate expo, GAIC, DAMAC, Africa Gulf investment, salon immobilier Dubai, investissement immobilier Afrique Golfe"
    />
    <meta name="theme-color" content="#141043" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AGREX 2026 | Africa Gulf Real Estate Expo" />
    <meta
      property="og:description"
      content="Le salon immobilier international Afrique-Golfe a Dubai, organise par AGREX et GAIC avec DAMAC comme partenaire exclusif a Dubai."
    />
    <meta property="og:image" content="assets/images/agrex-poster.jpeg" />
    <meta property="og:locale" content="fr_FR" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="assets/images/agrex-logo.jpeg" />
    <link rel="stylesheet" href="styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Event",
        "name": "AGREX 2026 - Africa Gulf Real Estate Expo",
        "description": "Salon immobilier international Afrique-Golfe organise a Dubai par AGREX et la Gulf Africa Investment Chamber - GAIC.",
        "startDate": "2026-10-19",
        "endDate": "2026-10-20",
        "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
        "eventStatus": "https://schema.org/EventScheduled",
        "location": {
          "@type": "Place",
          "name": "Dubai World Trade Centre",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Dubai",
            "addressCountry": "AE"
          }
        },
        "organizer": [
          {
            "@type": "Organization",
            "name": "AGREX"
          },
          {
            "@type": "Organization",
            "name": "Gulf Africa Investment Chamber - GAIC"
          }
        ],
        "sponsor": {
          "@type": "Organization",
          "name": "DAMAC"
        },
        "image": "assets/images/agrex-poster.jpeg"
      }
    </script>
  </head>
  <body>
    <div class="page-noise" aria-hidden="true"></div>
    <div class="page-glow glow-left" aria-hidden="true"></div>
    <div class="page-glow glow-right" aria-hidden="true"></div>

    <header class="site-header" id="top">
      <div class="container header-shell">
        <a class="brand" href="#top" aria-label="AGREX home">
          <div class="brand-mark">
            <img src="assets/images/agrex-logo.jpeg" alt="AGREX logo" />
          </div>
          <div class="brand-copy">
            <span class="brand-kicker">Africa Gulf Real Estate Expo</span>
            <strong>AGREX 2026</strong>
          </div>
        </a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="Primary">
          <a href="#exhibit" data-nav="exhibit"></a>
          <a href="#visit" data-nav="visit"></a>
          <a href="#conferences" data-nav="conferences"></a>
          <a href="#plan" data-nav="plan"></a>
          <a href="#invest" data-nav="invest"></a>
          <a href="#media" data-nav="media"></a>
          <a href="#partners" data-nav="partners"></a>
        </nav>

        <div class="header-actions">
          <div class="header-badge-stack">
            <span class="header-badge" data-text="header.organiserBadge"></span>
            <span class="header-badge header-badge-gold" data-text="header.partnerBadge"></span>
          </div>

          <div class="language-switch" role="group" aria-label="Language switch">
            <button class="language-button is-active" type="button" data-lang-switch="fr">FR</button>
            <button class="language-button" type="button" data-lang-switch="en">EN</button>
          </div>

          <a class="button button-primary button-compact" href="#visit" data-text="header.cta"></a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero section-first">
        <div class="hero-media" aria-hidden="true">
          <div class="hero-poster"></div>
          <div class="hero-video-shell">
            <video
              class="hero-background-video"
              autoplay
              muted
              loop
              playsinline
              preload="auto"
              poster="assets/images/agrex-networking.jpeg"
            >
              <source src="VIDEO DAMAC 1.mp4" type="video/mp4" />
            </video>
          </div>
          <div class="hero-scrim"></div>
        </div>

        <div class="container hero-shell">
          <div class="hero-copy" data-reveal>
            <h1 data-text="hero.title"></h1>
            <p class="hero-eventline" data-text="hero.eventLine"></p>

            <div class="hero-actions">
              <a class="button button-primary" href="#visit" data-text="hero.ctaPrimary"></a>
              <a class="button button-secondary" href="#exhibit" data-text="hero.ctaSecondary"></a>
            </div>
          </div>
          <div class="hero-accent-mark" aria-hidden="true">
            <span>AGREX</span>
          </div>
        </div>
      </section>

      <section class="home-highlights">
        <div class="container">
          <div class="highlights-header" data-reveal>
            <h2 data-text="highlights.title"></h2>
            <span class="highlights-badge" data-text="highlights.badge"></span>
          </div>
          <div class="hero-stats highlights-grid" id="hero-stats"></div>
        </div>
      </section>

      <section class="section showcase-section" id="exhibit">
        <div class="container">
          <div class="section-intro section-intro-wide" data-reveal>
            <p class="eyebrow" data-text="showcase.kicker"></p>
            <h2 data-text="showcase.title"></h2>
            <p class="section-lead" data-text="showcase.lead"></p>
          </div>

          <div class="story-grid" id="story-cards"></div>
        </div>
      </section>

      <section class="section speakers-section" id="conferences">
        <div class="container">
          <div class="section-intro" data-reveal>
            <p class="eyebrow" data-text="speakers.kicker"></p>
            <div class="section-heading-row">
              <h2 data-text="speakers.title"></h2>
              <a class="text-link" href="#plan" data-text="speakers.cta"></a>
            </div>
          </div>

          <div class="speaker-grid" id="speaker-cards"></div>
        </div>
      </section>

      <section class="section sponsors-section" id="sponsors">
        <div class="container">
          <div class="section-intro section-intro-wide" data-reveal>
            <p class="eyebrow" data-text="sponsors.kicker"></p>
            <h2 data-text="sponsors.title"></h2>
            <p class="section-lead" data-text="sponsors.lead"></p>
          </div>

          <div class="sponsor-grid" id="sponsor-cards"></div>

          <div class="sponsor-footer" data-reveal>
            <p class="sponsor-note" data-text="sponsors.note"></p>
            <a class="button button-primary sponsor-cta" href="#visit" data-text="sponsors.cta"></a>
          </div>
        </div>
      </section>

      <section class="section conference-section">
        <div class="container">
          <div class="section-intro" data-reveal>
            <p class="eyebrow" data-text="conference.kicker"></p>
            <div class="section-heading-row">
              <h2 data-text="conference.title"></h2>
              <a class="text-link" href="#visit" data-text="conference.cta"></a>
            </div>
            <p class="section-lead" data-text="conference.lead"></p>
          </div>

          <div class="conference-grid" id="conference-cards"></div>
        </div>
      </section>

      <section class="section investment-section" id="invest">
        <div class="container">
          <div class="section-intro" data-reveal>
            <p class="eyebrow" data-text="projects.kicker"></p>
            <div class="section-heading-row">
              <h2 data-text="projects.title"></h2>
              <a class="text-link" href="#partners" data-text="projects.cta"></a>
            </div>
            <p class="section-lead" data-text="projects.lead"></p>
          </div>

          <div class="project-grid" id="project-cards"></div>
        </div>
      </section>

      <section class="section travel-section" id="plan">
        <div class="container">
          <div class="section-intro" data-reveal>
            <p class="eyebrow" data-text="travel.kicker"></p>
            <h2 data-text="travel.title"></h2>
            <p class="section-lead" data-text="travel.lead"></p>
          </div>

          <div class="travel-grid" id="travel-cards"></div>
        </div>
      </section>

      <section class="section voices-section" id="media">
        <div class="container">
          <div class="section-intro" data-reveal>
            <p class="eyebrow" data-text="voices.kicker"></p>
            <h2 data-text="voices.title"></h2>
            <p class="section-lead" data-text="voices.lead"></p>
          </div>

          <div class="quote-grid" id="quote-cards"></div>
        </div>
      </section>

      <section class="section partners-section" id="partners">
        <div class="container">
          <div class="section-intro" data-reveal>
            <p class="eyebrow" data-text="partners.kicker"></p>
            <h2 data-text="partners.title"></h2>
            <p class="section-lead" data-text="partners.lead"></p>
          </div>

          <div class="partner-grid" id="partner-cards"></div>
        </div>
      </section>

      <section class="section pass-section" id="visit">
        <div class="container">
          <div class="pass-shell">
            <div class="pass-copy panel" data-reveal>
              <p class="eyebrow" data-text="visit.kicker"></p>
              <h2 data-text="visit.title"></h2>
              <p class="section-lead" data-text="visit.lead"></p>
              <p data-text="visit.body"></p>
              <div class="benefit-list" id="visit-benefits"></div>
            </div>

            <form class="pass-form panel" id="registration-form" data-reveal>
              <div class="form-grid">
                <label>
                  <span data-text="form.fullName"></span>
                  <input type="text" name="fullName" required />
                </label>
                <label>
                  <span data-text="form.organization"></span>
                  <input type="text" name="organization" required />
                </label>
                <label>
                  <span data-text="form.role"></span>
                  <select name="role" id="role-select" required></select>
                </label>
                <label>
                  <span data-text="form.country"></span>
                  <input type="text" name="country" required />
                </label>
                <label>
                  <span data-text="form.email"></span>
                  <input type="email" name="email" required />
                </label>
                <label>
                  <span data-text="form.phone"></span>
                  <input type="tel" name="phone" />
                </label>
                <label class="field-full">
                  <span data-text="form.interest"></span>
                  <textarea name="interest" rows="4" required></textarea>
                </label>
              </div>

              <button class="button button-primary button-full" type="submit" data-text="form.submit"></button>
              <p class="form-note" data-text="form.note"></p>
              <p class="form-status" id="form-status" aria-live="polite"></p>
            </form>
          </div>
        </div>
      </section>

      <section class="section keep-section">
        <div class="container keep-shell">
          <div class="keep-copy" data-reveal>
            <p class="eyebrow" data-text="keep.kicker"></p>
            <h2 data-text="keep.title"></h2>
            <p class="section-lead" data-text="keep.lead"></p>
          </div>

          <form class="keep-form panel" id="newsletter-form" data-reveal>
            <div class="form-grid form-grid-compact">
              <label>
                <span data-text="keep.firstName"></span>
                <input type="text" name="firstName" />
              </label>
              <label>
                <span data-text="keep.lastName"></span>
                <input type="text" name="lastName" />
              </label>
              <label class="field-full">
                <span data-text="keep.email"></span>
                <input type="email" name="newsletterEmail" />
              </label>
            </div>
            <button class="button button-secondary button-full" type="submit" data-text="keep.submit"></button>
            <p class="form-status" id="newsletter-status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-top">
        <div class="footer-brand">
          <img src="assets/images/agrex-logo.jpeg" alt="AGREX logo" />
          <div>
            <p class="eyebrow footer-eyebrow" data-text="footer.brandKicker"></p>
            <p data-text="footer.description"></p>
          </div>
        </div>
        <div class="footer-links">
          <a href="#exhibit" data-nav="exhibit"></a>
          <a href="#visit" data-nav="visit"></a>
          <a href="#conferences" data-nav="conferences"></a>
          <a href="#plan" data-nav="plan"></a>
          <a href="#invest" data-nav="invest"></a>
          <a href="#media" data-nav="media"></a>
          <a href="#partners" data-nav="partners"></a>
        </div>
      </div>

      <div class="container footer-info-grid" id="footer-info-cards"></div>

      <div class="container footer-bottom">
        <span data-text="footer.legal"></span>
        <a href="#top" data-text="footer.backToTop"></a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
